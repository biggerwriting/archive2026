<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Icon Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d11;--surface:#13161d;--surface2:#1a1e28;--surface3:#21263a;
  --border:#252a38;--border2:#2e3448;
  --text:#e2e6f0;--muted:#6b7390;--muted2:#4a5168;
  --cyan:#00e5ff;--purple:#b57bff;--lime:#a3e635;--amber:#fbbf24;--coral:#ff6b6b;--pink:#f472b6;
  --r:10px;--tr:0.18s ease;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(0,229,255,.04) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 100%,rgba(181,123,255,.04) 0%,transparent 60%);pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,3vw,2rem);height:56px;background:rgba(11,13,17,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;letter-spacing:.05em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;gap:.5rem;align-items:center}
.chip{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:.28rem .7rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:var(--tr)}
.chip:hover{border-color:var(--cyan);color:var(--cyan)}
.chip.active{background:var(--cyan);border-color:var(--cyan);color:#000}
.btn{display:flex;align-items:center;gap:.35rem;padding:.35rem .9rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.12)}
.btn-primary{border-color:var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan)}
.btn-primary:hover{background:rgba(0,229,255,.2);box-shadow:0 0 20px rgba(0,229,255,.2)}

/* LAYOUT */
.layout{position:relative;z-index:1;display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 56px)}
@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:1fr auto}}

/* GRID PANEL */
.grid-panel{overflow-y:auto;padding:clamp(1.25rem,3vw,2rem)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-title{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.search-wrap{position:relative}
.search-wrap input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:.4rem 2rem .4rem .75rem;width:180px;outline:none;transition:var(--tr)}
.search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
.search-wrap svg{position:absolute;right:.55rem;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}

.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.6rem}
.icon-card{display:flex;flex-direction:column;align-items:center;gap:.55rem;padding:.9rem .5rem .7rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:transform var(--tr),border-color var(--tr),box-shadow var(--tr);user-select:none}
.icon-card:hover{transform:translateY(-2px);border-color:var(--cyan);box-shadow:0 4px 24px rgba(0,0,0,.4),0 0 0 1px var(--cyan),0 0 16px rgba(0,229,255,.08)}
.icon-card.selected{border-color:var(--cyan);background:rgba(0,229,255,.06);box-shadow:0 0 0 1px var(--cyan),0 0 20px rgba(0,229,255,.1)}
.icon-card svg{transition:filter var(--tr)}
.icon-card:hover svg{filter:drop-shadow(0 0 6px var(--cyan))}
.icon-card.selected svg{filter:drop-shadow(0 0 8px var(--cyan))}
.icon-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;color:var(--muted);letter-spacing:.04em;text-align:center;line-height:1.2}

/* EDITOR PANEL */
.editor-panel{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
@media(max-width:900px){.editor-panel{border-left:none;border-top:1px solid var(--border);max-height:380px}}
.editor-header{padding:1.1rem 1.25rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0}
.editor-header h2{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.15rem}
.editor-header .icon-name{font-size:1rem;font-weight:600;color:var(--text)}

.preview-box{display:flex;align-items:center;justify-content:center;padding:2rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);position:relative;overflow:hidden}
.preview-box::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,var(--border2) 1px,transparent 1px);background-size:20px 20px;opacity:.5}
.preview-svg-wrap{position:relative;z-index:1;transition:filter var(--tr)}

.controls{padding:1.1rem 1.25rem;flex:1}
.ctrl-group{margin-bottom:1.1rem}
.ctrl-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:center}
.ctrl-label span{color:var(--text);font-size:.75rem;font-weight:600;letter-spacing:0}

/* color swatch row */
.swatch-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem}
.swatch{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform var(--tr),border-color var(--tr)}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#fff;box-shadow:0 0 8px currentColor}
.color-input-wrap{display:flex;gap:.5rem;align-items:center}
.color-input-wrap input[type=color]{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);cursor:pointer;padding:2px}
.color-input-wrap input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:.3rem .6rem;outline:none;transition:var(--tr)}
.color-input-wrap input[type=text]:focus{border-color:var(--cyan)}

/* slider */
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,.5);transition:transform var(--tr)}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}

/* stroke style */
.stroke-opts{display:flex;gap:.4rem}
.stroke-opt{padding:.3rem .7rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem;cursor:pointer;transition:var(--tr)}
.stroke-opt:hover{border-color:var(--cyan);color:var(--cyan)}
.stroke-opt.active{border-color:var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan)}

/* size pills */
.size-opts{display:flex;gap:.4rem}
.size-opt{padding:.3rem .65rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem;cursor:pointer;transition:var(--tr)}
.size-opt:hover{border-color:var(--purple);color:var(--purple)}
.size-opt.active{border-color:var(--purple);background:rgba(181,123,255,.1);color:var(--purple)}

/* export row */
.export-row{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-shrink:0}
.export-row .btn{flex:1;justify-content:center}

/* code snippet */
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem .9rem;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);line-height:1.6;word-break:break-all;white-space:pre-wrap;max-height:100px;overflow-y:auto;cursor:pointer;transition:border-color var(--tr)}
.code-box:hover{border-color:var(--cyan)}
.code-copy-hint{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted2);margin-top:.3rem;text-align:right}

/* toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--cyan);border-radius:8px;padding:.55rem 1.25rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--cyan);box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 20px rgba(0,229,255,.15);opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<nav>
  <span class="logo">// icon-studio</span>
  <div class="nav-right">
    <div id="filterChips" style="display:flex;gap:.4rem">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="ui">UI</button>
      <button class="chip" data-cat="media">Media</button>
      <button class="chip" data-cat="file">File</button>
      <button class="chip" data-cat="comm">Comm</button>
      <button class="chip" data-cat="nav">Nav</button>
    </div>
  </div>
</nav>

<div class="layout">
  <!-- LEFT: icon grid -->
  <div class="grid-panel">
    <div class="section-head">
      <span class="section-title" id="countLabel">48 icons</span>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search..." />
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="#6b7390" stroke-width="1.5"/><path d="M9 9l2.5 2.5" stroke="#6b7390" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="icon-grid" id="iconGrid"></div>
  </div>

  <!-- RIGHT: editor -->
  <div class="editor-panel">
    <div class="editor-header">
      <h2>Editor</h2>
      <div class="icon-name" id="editorName">Select an icon</div>
    </div>

    <div class="preview-box">
      <div class="preview-svg-wrap" id="previewSvg">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#6b7390" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" stroke-dasharray="3 3"/></svg>
      </div>
    </div>

    <div class="controls">
      <!-- Color -->
      <div class="ctrl-group">
        <div class="ctrl-label">Color <span id="colorVal">#00e5ff</span></div>
        <div class="swatch-row" id="swatchRow"></div>
        <div class="color-input-wrap">
          <input type="color" id="colorPicker" value="#00e5ff" />
          <input type="text" id="colorHex" value="#00e5ff" maxlength="7" placeholder="#rrggbb" />
        </div>
      </div>

      <!-- Stroke width -->
      <div class="ctrl-group">
        <div class="ctrl-label">Stroke Width <span id="strokeVal">1.5</span></div>
        <input type="range" id="strokeSlider" min="0.5" max="4" step="0.25" value="1.5" />
      </div>

      <!-- Size -->
      <div class="ctrl-group">
        <div class="ctrl-label">Preview Size</div>
        <div class="size-opts">
          <button class="size-opt" data-size="32">32</button>
          <button class="size-opt active" data-size="64">64</button>
          <button class="size-opt" data-size="96">96</button>
          <button class="size-opt" data-size="128">128</button>
        </div>
      </div>

      <!-- Stroke linecap -->
      <div class="ctrl-group">
        <div class="ctrl-label">Linecap</div>
        <div class="stroke-opts">
          <button class="stroke-opt active" data-cap="round">Round</button>
          <button class="stroke-opt" data-cap="square">Square</button>
          <button class="stroke-opt" data-cap="butt">Butt</button>
        </div>
      </div>

      <!-- Fill toggle -->
      <div class="ctrl-group">
        <div class="ctrl-label">Fill Mode</div>
        <div class="stroke-opts">
          <button class="stroke-opt active" data-fill="none">Stroke</button>
          <button class="stroke-opt" data-fill="color">Fill</button>
          <button class="stroke-opt" data-fill="both">Both</button>
        </div>
      </div>

      <!-- SVG code -->
      <div class="ctrl-group">
        <div class="ctrl-label">SVG Code</div>
        <div class="code-box" id="codeBox" onclick="copyCode()" title="Click to copy"></div>
        <div class="code-copy-hint">click to copy</div>
      </div>
    </div>

    <div class="export-row">
      <button class="btn btn-primary" onclick="exportSVG()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M4 20h16"/></svg>
        SVG
      </button>
      <button class="btn" onclick="exportPNG(32)">PNG 32</button>
      <button class="btn" onclick="exportPNG(64)">PNG 64</button>
      <button class="btn" onclick="exportPNG(256)">PNG 256</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Accent swatches ──
const SWATCHES = ['#00e5ff','#b57bff','#a3e635','#fbbf24','#ff6b6b','#f472b6','#ffffff','#6b7390'];

// ── State ──
let state = {
  selectedId: null,
  color: '#00e5ff',
  strokeWidth: 1.5,
  size: 64,
  linecap: 'round',
  fill: 'none',
  cat: 'all',
  search: '',
};

// ── Build swatch row ──
function buildSwatches() {
  const row = document.getElementById('swatchRow');
  row.innerHTML = SWATCHES.map(c =>
    `<div class="swatch${c===state.color?' active':''}" style="background:${c}" data-color="${c}" onclick="setColor('${c}')"></div>`
  ).join('');
}

// ── Render icon grid ──
function renderGrid() {
  const grid = document.getElementById('iconGrid');
  const q = state.search.toLowerCase();
  const list = ICONS.filter(ic =>
    (state.cat === 'all' || ic.cat === state.cat) &&
    (!q || ic.name.toLowerCase().includes(q) || ic.id.includes(q))
  );
  document.getElementById('countLabel').textContent = `${list.length} icons`;

  grid.innerHTML = list.map(ic => {
    const sel = ic.id === state.selectedId;
    return `
    <div class="icon-card${sel?' selected':''}" data-id="${ic.id}" onclick="selectIcon('${ic.id}')">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
        stroke="${sel ? state.color : '#6b7390'}"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        ${pathsToElements(ic.path)}
      </svg>
      <span class="icon-label">${ic.name}</span>
    </div>`;
  }).join('');
}

function pathsToElements(pathStr) {
  return pathStr.split(' M').map((seg,i) => `<path d="${i===0?seg:'M'+seg}" />`).join('');
}

// ── Select icon ──
function selectIcon(id) {
  state.selectedId = id;
  renderGrid();
  updateEditor();
}

// ── Update editor panel ──
function updateEditor() {
  const ic = ICONS.find(x => x.id === state.selectedId);
  if (!ic) return;

  document.getElementById('editorName').textContent = ic.name;

  const fillAttr  = state.fill === 'none'  ? 'none' :
                    state.fill === 'fill'   ? state.color :
                    state.color;
  const strokeAttr = state.fill === 'fill' ? 'none' : state.color;

  const svgStr = buildSVG(ic, state.size, state.color, state.strokeWidth, state.linecap, state.fill);
  document.getElementById('previewSvg').innerHTML = svgStr;
  document.getElementById('codeBox').textContent  = buildSVG(ic, 24, state.color, state.strokeWidth, state.linecap, state.fill);
}

function buildSVG(ic, size, color, sw, cap, fillMode) {
  const fill   = fillMode === 'none'  ? 'none' :
                 fillMode === 'color' ? color  : color;
  const stroke = fillMode === 'color' ? 'none' : color;
  const opacity = fillMode === 'both' ? '0.2' : '1';
  const paths = ic.path.split(' M').map((seg, i) => {
    const d = i === 0 ? seg : 'M' + seg;
    const f = fillMode === 'both' ? color : fill;
    const fo = fillMode === 'both' ? '0.18' : '1';
    return `  <path d="${d}" fill="${f}" fill-opacity="${fo}" />`;
  }).join('\n');

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="${cap}" stroke-linejoin="round">
${paths}
</svg>`;
}

// ── Color ──
function setColor(hex) {
  state.color = hex;
  document.getElementById('colorPicker').value = hex;
  document.getElementById('colorHex').value    = hex;
  document.getElementById('colorVal').textContent = hex;
  buildSwatches();
  renderGrid();
  updateEditor();
}

document.getElementById('colorPicker').addEventListener('input', e => setColor(e.target.value));
document.getElementById('colorHex').addEventListener('input', e => {
  const v = e.target.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) setColor(v);
});

// ── Stroke slider ──
document.getElementById('strokeSlider').addEventListener('input', e => {
  state.strokeWidth = parseFloat(e.target.value);
  document.getElementById('strokeVal').textContent = state.strokeWidth;
  updateEditor();
});

// ── Size pills ──
document.querySelectorAll('.size-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.size = parseInt(btn.dataset.size);
    updateEditor();
  });
});

// ── Linecap ──
document.querySelectorAll('.stroke-opt[data-cap]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stroke-opt[data-cap]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.linecap = btn.dataset.cap;
    updateEditor();
  });
});

// ── Fill mode ──
document.querySelectorAll('.stroke-opt[data-fill]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.stroke-opt[data-fill]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.fill = btn.dataset.fill;
    updateEditor();
  });
});

// ── Filter chips ──
document.getElementById('filterChips').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.cat = btn.dataset.cat;
  renderGrid();
});

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  renderGrid();
});

// ── Copy code ──
function copyCode() {
  const ic = ICONS.find(x => x.id === state.selectedId);
  if (!ic) return;
  const code = buildSVG(ic, 24, state.color, state.strokeWidth, state.linecap, state.fill);
  navigator.clipboard.writeText(code).then(() => showToast('SVG code copied!'));
}

// ── Export SVG ──
function exportSVG() {
  const ic = ICONS.find(x => x.id === state.selectedId);
  if (!ic) { showToast('Select an icon first'); return; }
  const code = buildSVG(ic, 24, state.color, state.strokeWidth, state.linecap, state.fill);
  const blob = new Blob([code], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${ic.id}.svg`;
  a.click();
  showToast(`Exported ${ic.id}.svg`);
}

// ── Export PNG ──
function exportPNG(size) {
  const ic = ICONS.find(x => x.id === state.selectedId);
  if (!ic) { showToast('Select an icon first'); return; }
  const svgStr = buildSVG(ic, size, state.color, state.strokeWidth, state.linecap, state.fill);
  const img = new Image();
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url  = URL.createObjectURL(blob);
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `${ic.id}-${size}.png`;
    a.click();
    showToast(`Exported ${ic.id}-${size}.png`);
  };
  img.src = url;
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ──
buildSwatches();
renderGrid();
// Auto-select first icon
selectIcon(ICONS[0].id);
</script>
