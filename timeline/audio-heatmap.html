<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audio Heatmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d11;--surface:#13161d;--surface2:#1a1e28;--border:#252a38;--border2:#2e3448;
  --text:#e2e6f0;--muted:#6b7390;--muted2:#3d4460;
  --cyan:#00e5ff;--purple:#b57bff;--lime:#a3e635;--amber:#fbbf24;--coral:#ff6b6b;
  --tr:0.18s ease;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Grotesk',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:clamp(1.5rem,4vw,3rem) clamp(1rem,3vw,2rem);
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 5%, rgba(0,229,255,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 90%, rgba(181,123,255,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.page{position:relative;z-index:1;width:100%;max-width:900px;display:flex;flex-direction:column;gap:1.75rem}

/* ── Header ── */
header{text-align:center}
.logo{
  font-family:'JetBrains Mono',monospace;font-size:clamp(1.1rem,2.5vw,1.5rem);
  font-weight:700;letter-spacing:.06em;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.35rem;
}
.sub{font-size:.85rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* ── Drop zone ── */
.drop-zone{
  border:2px dashed var(--border2);border-radius:16px;
  background:var(--surface);
  padding:clamp(2rem,5vw,3.5rem) 2rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
  cursor:pointer;transition:border-color var(--tr),background var(--tr),box-shadow var(--tr);
  position:relative;overflow:hidden;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--cyan);background:rgba(0,229,255,.04);
  box-shadow:0 0 40px rgba(0,229,255,.08),inset 0 0 40px rgba(0,229,255,.03);
}
.drop-icon{
  width:56px;height:56px;border-radius:50%;
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);
  display:flex;align-items:center;justify-content:center;
  transition:transform var(--tr),box-shadow var(--tr);
}
.drop-zone:hover .drop-icon{transform:scale(1.08);box-shadow:0 0 20px rgba(0,229,255,.2)}
.drop-text{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);text-align:center;line-height:1.6}
.drop-text strong{color:var(--cyan)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}

/* ── Color theme selector ── */
.theme-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.theme-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.themes{display:flex;gap:.4rem;flex-wrap:wrap}
.theme-btn{
  width:32px;height:18px;border-radius:4px;border:2px solid transparent;
  cursor:pointer;transition:transform var(--tr),border-color var(--tr);
}
.theme-btn:hover{transform:scale(1.1)}
.theme-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

/* ── Player card ── */
.player-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;display:none;flex-direction:column;
}
.player-card.visible{display:flex}

/* file info bar */
.file-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.25rem;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.file-name{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;color:var(--cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.file-meta{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted)}

/* ── Viz wrapper: waveform + spectrogram stacked ── */
.viz-stack{display:flex;flex-direction:column}

/* shared scrub zone */
.viz-area{position:relative;cursor:crosshair;user-select:none}

/* heatmap canvas — bottom layer of waveform area */
#heatmapCanvas{
  display:block;width:100%;height:72px;
  image-rendering:pixelated;
}
/* waveform canvas — overlay */
#waveCanvas{
  position:absolute;top:0;left:0;
  display:block;width:100%;height:72px;
  pointer-events:none;
}

/* ── Spectrogram area ── */
.spec-area{
  position:relative;cursor:crosshair;user-select:none;
  border-top:1px solid var(--border2);
}
#specCanvas{
  display:block;width:100%;height:160px;
  image-rendering:pixelated;
}
/* freq axis labels */
.spec-axis{
  position:absolute;top:0;left:0;height:100%;width:36px;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:2px 0;pointer-events:none;
}
.spec-axis span{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  color:rgba(255,255,255,.35);text-align:right;padding-right:4px;
  line-height:1;
}
/* spectrogram playhead — separate element so it spans only spec */
.spec-playhead{
  position:absolute;top:0;width:2px;height:100%;left:0%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan),0 0 16px rgba(0,229,255,.4);
  pointer-events:none;transition:left .05s linear;
}
.spec-progress{
  position:absolute;top:0;left:0;height:100%;width:0%;
  background:rgba(255,255,255,.04);
  pointer-events:none;transition:width .05s linear;
}

/* shared playhead overlay (waveform zone) */
.progress-fill{
  position:absolute;top:0;left:0;height:100%;width:0%;
  background:rgba(0,229,255,.1);
  transition:width .05s linear;
  pointer-events:none;
}
.playhead-line{
  position:absolute;top:0;width:2px;height:100%;
  background:var(--cyan);left:0%;
  box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,229,255,.4);
  transition:left .05s linear;
  pointer-events:none;
}

/* hover scrub tooltip — shared, shown on either zone */
.scrub-tip{
  position:absolute;top:-26px;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--cyan);border-radius:5px;
  font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--cyan);
  padding:.13rem .42rem;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .1s;z-index:10;
}

/* colorbar legend */
.colorbar-row{
  display:flex;align-items:center;gap:.6rem;
  padding:.45rem 1.25rem .3rem;border-top:1px solid var(--border);
  background:var(--surface2);
}
.colorbar{
  flex:1;height:8px;border-radius:4px;
  background:linear-gradient(90deg,#000 0%,#00008b 25%,#0080ff 45%,#ffdd00 75%,#ffffff 100%);
}
.cb-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);white-space:nowrap}
.cb-label.right{text-align:right}

/* controls bar */
.controls-bar{
  display:flex;align-items:center;gap:.75rem;
  padding:.85rem 1.25rem;border-top:1px solid var(--border);
}
.btn-play{
  width:40px;height:40px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  color:#000;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:transform var(--tr),box-shadow var(--tr);
}
.btn-play:hover{transform:scale(1.08);box-shadow:0 0 20px rgba(0,229,255,.35)}
.btn-play:active{transform:scale(.95)}

.time-display{
  font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted);
  white-space:nowrap;flex-shrink:0;
}
.time-display span{color:var(--text)}

/* volume */
.vol-wrap{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.vol-icon{color:var(--muted);flex-shrink:0}
input[type=range].vol{
  width:80px;-webkit-appearance:none;height:3px;border-radius:2px;
  background:var(--border2);outline:none;cursor:pointer;
}
input[type=range].vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 6px rgba(0,229,255,.5);
}

/* ── Processing state ── */
.processing{
  display:none;flex-direction:column;align-items:center;gap:1rem;
  padding:2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:16px;
}
.processing.visible{display:flex}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);border-top-color:var(--cyan);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-label{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted)}
.proc-bar-wrap{width:200px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.proc-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:2px;transition:width .1s}

/* ── Stats row ── */
.stats-row{
  display:none;flex-wrap:wrap;gap:.6rem;
}
.stats-row.visible{display:flex}
.stat{
  flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:.7rem 1rem;
}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--cyan)}

/* loop btn */
.btn-loop{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:var(--tr);
}
.btn-loop:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-loop.active{border-color:var(--cyan);background:rgba(0,229,255,.12);color:var(--cyan);box-shadow:0 0 10px rgba(0,229,255,.2)}

/* speed */
.speed-wrap{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.speed-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--cyan);min-width:2.2rem;text-align:right}
.ctrl-mini-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);white-space:nowrap}

/* freq bar */
.freq-bar{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem 1.25rem;border-top:1px solid var(--border);background:var(--surface2);
}
.freq-val{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);min-width:3.5rem}
.freq-val:last-child{text-align:right}
.dual-range-wrap{position:relative;flex:1;height:16px;display:flex;align-items:center}
.freq-range{
  position:absolute;width:100%;-webkit-appearance:none;height:3px;
  background:transparent;outline:none;cursor:pointer;pointer-events:none;
}
.freq-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 6px rgba(0,229,255,.5);
  pointer-events:all;cursor:pointer;
}
.freq-track-fill{
  position:absolute;height:3px;background:var(--cyan);border-radius:2px;
  pointer-events:none;opacity:.5;
}
/* base track */
.dual-range-wrap::before{
  content:'';position:absolute;width:100%;height:3px;
  background:var(--border2);border-radius:2px;
}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="logo">// audio-heatmap</div>
    <div class="sub">upload audio → visualize energy → scrub with precision</div>
  </header>

  <!-- Color theme row -->
  <div class="theme-row">
    <span class="theme-label">Palette</span>
    <div class="themes" id="themes"></div>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <div class="drop-text">
      <strong>Drop audio here</strong> or click to browse<br>
      MP3 · WAV · OGG · FLAC · M4A · AAC
    </div>
    <input type="file" id="fileInput" accept="audio/*" />
  </div>

  <!-- Processing -->
  <div class="processing" id="processing">
    <div class="spinner"></div>
    <div class="proc-label" id="procLabel">Decoding audio...</div>
    <div class="proc-bar-wrap"><div class="proc-bar" id="procBar"></div></div>
  </div>

  <!-- Player card -->
  <div class="player-card" id="playerCard">
    <div class="file-bar">
      <div class="file-name" id="fileName">—</div>
      <div class="file-meta" id="fileMeta">—</div>
    </div>

    <!-- Viz stack: waveform heatmap + spectrogram -->
    <div class="viz-stack" id="vizStack">

      <!-- Waveform / energy heatmap -->
      <div class="viz-area" id="vizArea">
        <canvas id="heatmapCanvas" height="72"></canvas>
        <canvas id="waveCanvas"    height="72"></canvas>
        <div class="progress-fill" id="progressFill"></div>
        <div class="playhead-line" id="playheadLine"></div>
        <div class="scrub-tip"     id="scrubTip"></div>
      </div>

      <!-- Spectrogram: time × frequency × loudness -->
      <div class="spec-area" id="specArea">
        <canvas id="specCanvas" height="160"></canvas>
        <div class="spec-progress"  id="specProgress"></div>
        <div class="spec-playhead"  id="specPlayhead"></div>
        <div class="spec-axis" id="specAxis"></div>
        <div class="scrub-tip" id="scrubTip2"></div>
      </div>

      <!-- Colorbar -->
      <div class="colorbar-row">
        <span class="cb-label">-80 dB</span>
        <div class="colorbar"></div>
        <span class="cb-label right">0 dB</span>
      </div>

    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <button class="btn-play" id="btnPlay" title="Play / Pause (Space)">
        <svg id="iconPlay" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
        <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
      </button>

      <!-- Loop button -->
      <button class="btn-loop" id="btnLoop" title="Loop [ ]">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
        </svg>
      </button>

      <div class="time-display"><span id="timeCur">0:00</span> / <span id="timeTot">0:00</span></div>

      <!-- Speed -->
      <div class="speed-wrap">
        <span class="ctrl-mini-label">Speed</span>
        <input type="range" class="vol" id="speedSlider" min="-1" max="1.6" step="0.01" value="0" title="Playback speed" />
        <span class="speed-val" id="speedVal">1×</span>
      </div>

      <!-- Volume -->
      <div class="vol-wrap">
        <svg class="vol-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
        <input type="range" class="vol" id="volSlider" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>

    <!-- Freq range bar -->
    <div class="freq-bar" id="freqBar">
      <span class="ctrl-mini-label">Freq range</span>
      <span class="freq-val" id="freqLowVal">20 Hz</span>
      <div class="dual-range-wrap">
        <input type="range" class="freq-range" id="freqLow"  min="0" max="100" value="0"   step="1" />
        <input type="range" class="freq-range" id="freqHigh" min="0" max="100" value="100" step="1" />
        <div class="freq-track-fill" id="freqTrackFill"></div>
      </div>
      <span class="freq-val" id="freqHighVal">20k Hz</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="stat-label">Duration</div><div class="stat-val" id="sDuration">—</div></div>
    <div class="stat"><div class="stat-label">Sample Rate</div><div class="stat-val" id="sSampleRate">—</div></div>
    <div class="stat"><div class="stat-label">Channels</div><div class="stat-val" id="sChannels">—</div></div>
    <div class="stat"><div class="stat-label">Peak dB</div><div class="stat-val" id="sPeak">—</div></div>
    <div class="stat"><div class="stat-label">RMS Energy</div><div class="stat-val" id="sRms">—</div></div>
  </div>

</div><!-- .page -->

<script>
// ── Color palettes ─────────────────────────────────────────────
const PALETTES = {
  cyan:   { stops: ['#001a1f','#003d4d','#00e5ff','#ffffff'], label: 'Cyan',   accent: '#00e5ff' },
  fire:   { stops: ['#0d0000','#4d0000','#ff4400','#ffdd00'], label: 'Fire',   accent: '#ff6b00' },
  purple: { stops: ['#0d0011','#3d0055','#b57bff','#f0d0ff'], label: 'Purple', accent: '#b57bff' },
  lime:   { stops: ['#050d00','#1a3300','#a3e635','#e8ffb0'], label: 'Lime',   accent: '#a3e635' },
  sunset: { stops: ['#0d0508','#4d1040','#ff6b6b','#fbbf24'], label: 'Sunset', accent: '#ff6b6b' },
  mono:   { stops: ['#050505','#1a1a1a','#888888','#ffffff'], label: 'Mono',   accent: '#aaaaaa' },
};
let activePalette = 'cyan';

// Build palette buttons
const themesEl = document.getElementById('themes');
Object.entries(PALETTES).forEach(([key, pal]) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn' + (key === activePalette ? ' active' : '');
  btn.title = pal.label;
  btn.style.background = `linear-gradient(135deg, ${pal.stops[1]}, ${pal.stops[2]}, ${pal.stops[3]})`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePalette = key;
    if (waveformData) { drawHeatmap(waveformData); drawWaveform(waveformData); }
  });
  themesEl.appendChild(btn);
});

// ── State ──────────────────────────────────────────────────────
let audioCtx    = null;
let audioBuffer = null;
let sourceNode  = null;
let gainNode    = null;
let waveformData = null;
let spectroData  = null;
let spectroFrames = 0;
let spectroFreqBins = 0;
let spectroFftSize = 16384;
let isPlaying   = false;
let startTime   = 0;
let pauseOffset = 0;
let duration    = 0;
let rafId       = null;
let loopEnabled  = false;
let playbackRate = 1;
let zoomScale    = 1;
let zoomOffset   = 0;
let freqLowPct   = 0;
let freqHighPct  = 100;
let nyquistHz    = 22050;

const heatCanvas  = document.getElementById('heatmapCanvas');
const waveCanvas  = document.getElementById('waveCanvas');
const specCanvas  = document.getElementById('specCanvas');
const heatCtx     = heatCanvas.getContext('2d');
const waveCtxEl   = waveCanvas.getContext('2d');
const specCtx     = specCanvas.getContext('2d');

// ── Helpers ────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function paletteColor(t, stops) {
  // t in [0,1], stops is array of hex colors
  const n = stops.length - 1;
  const i = Math.min(Math.floor(t * n), n - 1);
  const f = t * n - i;
  const [r1,g1,b1] = hexToRgb(stops[i]);
  const [r2,g2,b2] = hexToRgb(stops[i+1]);
  return [
    Math.round(lerp(r1,r2,f)),
    Math.round(lerp(g1,g2,f)),
    Math.round(lerp(b1,b2,f)),
  ];
}

// ── File input ─────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) loadFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

async function loadFile(file) {
  stopAudio();
  showProcessing(true, 'Decoding audio…', 0);

  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileMeta').textContent =
    `${(file.size / 1024 / 1024).toFixed(2)} MB`;

  const arrayBuf = await file.arrayBuffer();
  setProgress(20);

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
  setProgress(60);

  duration   = audioBuffer.duration;
  nyquistHz  = audioBuffer.sampleRate / 2;
  document.getElementById('timeTot').textContent = fmtTime(duration);
  document.getElementById('timeCur').textContent = '0:00';
  pauseOffset = 0;
  // Reset zoom & freq range on new file
  zoomScale = 1; zoomOffset = 0;
  freqLowPct = 0; freqHighPct = 100;
  freqLowEl.value = 0; freqHighEl.value = 100;
  updateFreqFill();

  // Stats
  document.getElementById('sDuration').textContent   = fmtTime(duration);
  document.getElementById('sSampleRate').textContent = (audioBuffer.sampleRate / 1000).toFixed(1) + ' kHz';
  document.getElementById('sChannels').textContent   = audioBuffer.numberOfChannels;

  // Compute waveform + stats
  setProgress(50); showProcessing(true, 'Analyzing waveform…', 50);
  const data = computeWaveform(audioBuffer);
  waveformData = data.rms;
  document.getElementById('sPeak').textContent = data.peakDb.toFixed(1) + ' dB';
  document.getElementById('sRms').textContent  = data.rmsDb.toFixed(1) + ' dB';

  // Compute spectrogram (STFT)
  setProgress(70); showProcessing(true, 'Computing spectrogram…', 70);
  await new Promise(r => setTimeout(r, 0)); // yield so label updates
  const spec = await computeSpectrogram(audioBuffer);
  spectroData     = spec.data;
  spectroFrames   = spec.frames;
  spectroFreqBins = spec.freqBins;
  spectroFftSize  = spec.fftSize;
  buildSpecAxis(audioBuffer.sampleRate, spec.freqBins, spec.fftSize);

  setProgress(100);

  // Show card FIRST so clientWidth is non-zero, then size & draw
  showProcessing(false);
  document.getElementById('playerCard').classList.add('visible');
  document.getElementById('statsRow').classList.add('visible');
  dropZone.style.display = 'none';

  // Let the browser paint before reading layout dimensions
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  try {
    sizeCanvases();
    drawHeatmap(waveformData);
    drawWaveform(waveformData);
    drawSpectrogram(spectroData, spectroFrames, spectroFreqBins);
  } catch (err) {
    console.error('Draw error:', err);
  }
}

// ── Compute waveform data ──────────────────────────────────────
function computeWaveform(buf) {
  const W = Math.min(2000, Math.max(600, Math.round(window.innerWidth * 2)));
  const ch = buf.numberOfChannels;
  const samples = buf.length;
  const chunkSize = Math.floor(samples / W);
  const rms = new Float32Array(W);
  let peakAbs = 0;
  let totalRms = 0;

  for (let col = 0; col < W; col++) {
    let sum = 0;
    const start = col * chunkSize;
    for (let c = 0; c < ch; c++) {
      const channelData = buf.getChannelData(c);
      for (let s = start; s < start + chunkSize; s++) {
        const v = channelData[s] || 0;
        sum += v * v;
        if (Math.abs(v) > peakAbs) peakAbs = Math.abs(v);
      }
    }
    rms[col] = Math.sqrt(sum / (chunkSize * ch));
    totalRms += rms[col] * rms[col];
  }

  const peakDb = peakAbs > 0 ? 20 * Math.log10(peakAbs) : -Infinity;
  const rmsDb  = totalRms > 0 ? 20 * Math.log10(Math.sqrt(totalRms / W)) : -Infinity;
  return { rms, peakDb, rmsDb };
}

// ── Compute spectrogram via manual STFT (async, chunked) ──────
async function computeSpectrogram(buf) {
  const sampleRate = buf.sampleRate;
  const samples    = buf.length;
  // Mix down to mono
  const mono = new Float32Array(samples);
  for (let c = 0; c < buf.numberOfChannels; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < samples; i++) mono[i] += ch[i];
  }
  if (buf.numberOfChannels > 1) {
    for (let i = 0; i < samples; i++) mono[i] /= buf.numberOfChannels;
  }

  // Target fftSize=16384 for ~2.7 Hz/bin resolution (resolves all piano keys).
  // For short audio, reduce fftSize so we always get at least 1 frame.
  // fftSize must be a power of 2.
  let fftSize = 16384;
  while (fftSize > 512 && samples < fftSize) fftSize >>= 1;
  fftSize = Math.max(512, fftSize);  // floor at 512

  const hopSize  = Math.max(128, Math.floor(fftSize / 8));
  const freqBins = fftSize / 2;
  const frames   = Math.max(1, Math.floor((samples - fftSize) / hopSize) + 1);

  // Hann window
  const window_ = new Float32Array(fftSize);
  for (let i = 0; i < fftSize; i++)
    window_[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (fftSize - 1)));

  // Output: frames × freqBins, dB values
  const data = new Float32Array(frames * freqBins);

  // Simple DFT is too slow; use a split-radix FFT implementation
  const re = new Float32Array(fftSize);
  const im = new Float32Array(fftSize);

  // Process in chunks, yielding every 50 frames so the browser stays responsive
  // (We make this sync but split into a helper called with await in loadFile)
  const CHUNK = 50;
  for (let f = 0; f < frames; f++) {
    const offset = f * hopSize;
    for (let i = 0; i < fftSize; i++) {
      re[i] = (mono[offset + i] || 0) * window_[i];
      im[i] = 0;
    }
    fft(re, im, fftSize);
    for (let b = 0; b < freqBins; b++) {
      const mag = Math.sqrt(re[b] * re[b] + im[b] * im[b]) / fftSize;
      data[f * freqBins + b] = mag > 1e-10 ? 20 * Math.log10(mag) : -120;
    }
    // Yield to browser every chunk to keep UI responsive
    if (f % CHUNK === 0) {
      const pct = 70 + Math.round((f / frames) * 25);
      setProgress(pct);
      await new Promise(r => setTimeout(r, 0));
    }
  }

  return { data, frames, freqBins, fftSize };
}

// Cooley–Tukey in-place FFT (radix-2, iterative)
function fft(re, im, n) {
  // Bit-reversal permutation
  let j = 0;
  for (let i = 1; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      [re[i], re[j]] = [re[j], re[i]];
      [im[i], im[j]] = [im[j], im[i]];
    }
  }
  // FFT butterfly
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let curRe = 1, curIm = 0;
      for (let k = 0; k < len / 2; k++) {
        const uRe = re[i + k],         uIm = im[i + k];
        const vRe = re[i + k + len/2], vIm = im[i + k + len/2];
        const tRe = curRe * vRe - curIm * vIm;
        const tIm = curRe * vIm + curIm * vRe;
        re[i + k]         = uRe + tRe;  im[i + k]         = uIm + tIm;
        re[i + k + len/2] = uRe - tRe;  im[i + k + len/2] = uIm - tIm;
        const nextRe = curRe * wRe - curIm * wIm;
        curIm = curRe * wIm + curIm * wRe;
        curRe = nextRe;
      }
    }
  }
}

// ── Spectrogram color map: black→navy→blue→cyan→yellow→white ──
// Classic "hot" spectral colormap
function spectroColor(t) {
  // t in [0,1]
  // stops: 0=black, 0.2=dark blue, 0.45=blue, 0.65=cyan, 0.85=yellow, 1=white
  const stops = [
    [0,    [0,   0,   0  ]],
    [0.18, [0,   0,   80 ]],
    [0.40, [0,   40,  200]],
    [0.60, [0,   200, 240]],
    [0.80, [255, 220, 0  ]],
    [1.00, [255, 255, 255]],
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const [t0, c0] = stops[i];
    const [t1, c1] = stops[i + 1];
    if (t <= t1) {
      const f = (t - t0) / (t1 - t0);
      return [
        Math.round(c0[0] + (c1[0] - c0[0]) * f),
        Math.round(c0[1] + (c1[1] - c0[1]) * f),
        Math.round(c0[2] + (c1[2] - c0[2]) * f),
      ];
    }
  }
  return [255, 255, 255];
}

// ── Build frequency axis labels ────────────────────────────────
function buildSpecAxis(sampleRate, freqBins, fftSize) {
  const nyquist    = sampleRate / 2;
  const globalMinLog = Math.log10(20);
  const globalMaxLog = Math.log10(nyquist);
  const lo = Math.min(freqLowPct, freqHighPct) / 100;
  const hi = Math.max(freqLowPct, freqHighPct) / 100;
  const viewMinHz = Math.pow(10, globalMinLog + lo * (globalMaxLog - globalMinLog));
  const viewMaxHz = Math.pow(10, globalMinLog + hi * (globalMaxLog - globalMinLog));

  // Piano key ticks — denser in low range
  const allTicks = [27, 55, 110, 220, 440, 880, 1760, 3520, 7040, 14080]
    .concat([100, 250, 500, 1000, 2000, 4000, 8000, 16000]);
  const ticks = [...new Set(allTicks)]
    .filter(hz => hz >= viewMinHz * 0.9 && hz <= viewMaxHz * 1.1)
    .sort((a,b) => a-b);

  const axisEl = document.getElementById('specAxis');
  axisEl.innerHTML = '';
  const H = 160;
  const viewMinLog = Math.log10(viewMinHz);
  const viewMaxLog = Math.log10(viewMaxHz);

  ticks.forEach(hz => {
    const logPos = (Math.log10(hz) - viewMinLog) / (viewMaxLog - viewMinLog);
    if (logPos < 0 || logPos > 1) return;
    const y = H - logPos * H;
    const span = document.createElement('span');
    span.textContent = hz >= 1000 ? (hz/1000).toFixed(hz >= 10000 ? 0 : 1) + 'k' : hz;
    span.style.position = 'absolute';
    span.style.top = (y - 7) + 'px';
    span.style.right = '2px';
    axisEl.appendChild(span);
  });
}

// ── Draw spectrogram ───────────────────────────────────────────
function drawSpectrogram(data, frames, freqBins) {
  // Always use physical pixel dimensions for ImageData
  const W = specCanvas.width;
  const H = specCanvas.height;
  if (!W || !H) return;

  const DB_MIN = -80;
  const DB_MAX = -10;

  const imageData = specCtx.createImageData(W, H);
  const d = imageData.data;

  // Each bin b covers frequency: b * sampleRate / fftSize
  // So bin index for frequency f = f * fftSize / sampleRate
  const sampleRate = audioBuffer ? audioBuffer.sampleRate : 44100;
  const fftSize    = spectroFftSize;  // actual fftSize used during analysis

  // Frequency range controlled by the sliders (log scale, 20Hz–Nyquist)
  const nyquist    = sampleRate / 2;
  const globalMinLog = Math.log10(20);
  const globalMaxLog = Math.log10(nyquist);
  const lo = Math.min(freqLowPct, freqHighPct) / 100;
  const hi = Math.max(freqLowPct, freqHighPct) / 100;
  // Visible frequency range in Hz
  const viewMinHz = Math.pow(10, globalMinLog + lo * (globalMaxLog - globalMinLog));
  const viewMaxHz = Math.pow(10, globalMinLog + hi * (globalMaxLog - globalMinLog));
  const viewMinLog = Math.log10(viewMinHz);
  const viewMaxLog = Math.log10(viewMaxHz);

  for (let x = 0; x < W; x++) {
    const frameIdx = Math.min(frames - 1, Math.floor(x / W * frames));
    for (let y = 0; y < H; y++) {
      // y=0 → top → high freq; y=H-1 → bottom → low freq
      const yNorm = 1 - y / H;  // 0=low, 1=high
      // Map yNorm → Hz (log scale within view window)
      const hz     = Math.pow(10, viewMinLog + yNorm * (viewMaxLog - viewMinLog));
      // Convert Hz → bin index (linear: bin = hz * fftSize / sampleRate)
      const binIdx = Math.min(freqBins - 1, Math.max(0, Math.round(hz * fftSize / sampleRate)));
      const db = data[frameIdx * freqBins + binIdx];
      const t  = Math.max(0, Math.min(1, (db - DB_MIN) / (DB_MAX - DB_MIN)));
      const [r, g, b] = spectroColor(t);
      const base = (y * W + x) * 4;
      d[base] = r; d[base+1] = g; d[base+2] = b; d[base+3] = 255;
    }
  }
  // putImageData ignores canvas transform — reset to identity
  specCtx.save();
  specCtx.setTransform(1, 0, 0, 1, 0, 0);
  specCtx.putImageData(imageData, 0, 0);
  specCtx.restore();
}

// ── Canvas sizing ──────────────────────────────────────────────
function sizeCanvases() {
  const w = document.getElementById('vizArea').clientWidth;
  if (!w) return;
  const dpr = window.devicePixelRatio || 1;

  // Waveform canvases
  [heatCanvas, waveCanvas].forEach(c => {
    c.style.width  = w + 'px';
    c.style.height = '72px';
    c.width  = Math.round(w * dpr);
    c.height = Math.round(72 * dpr);
  });
  heatCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  waveCtxEl.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Spectrogram canvas
  specCanvas.style.width  = w + 'px';
  specCanvas.style.height = '160px';
  specCanvas.width  = Math.round(w * dpr);
  specCanvas.height = Math.round(160 * dpr);
  specCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Draw heatmap ───────────────────────────────────────────────
function drawHeatmap(rms) {
  // Use physical pixel dimensions (canvas.width/height, not clientWidth)
  const W = heatCanvas.width;
  const H = heatCanvas.height;
  const pal = PALETTES[activePalette].stops;
  const n = rms.length;

  let maxRms = 0;
  for (let i = 0; i < n; i++) if (rms[i] > maxRms) maxRms = rms[i];
  if (maxRms === 0) maxRms = 1;

  const imageData = heatCtx.createImageData(W, H);
  const d = imageData.data;

  for (let x = 0; x < W; x++) {
    const idx = Math.floor(x / W * n);
    const energy = rms[idx] / maxRms;
    for (let y = 0; y < H; y++) {
      const yNorm = 1 - y / H;
      const threshold = yNorm;
      const t = energy > threshold
        ? Math.min(1, (energy - threshold) / (1 - threshold + 0.001)) * energy
        : 0;
      const [r, g, b] = paletteColor(Math.pow(t, 0.6), pal);
      const base = (y * W + x) * 4;
      d[base] = r; d[base+1] = g; d[base+2] = b; d[base+3] = 255;
    }
  }
  // putImageData bypasses the transform, so reset to identity first
  heatCtx.save();
  heatCtx.setTransform(1, 0, 0, 1, 0, 0);
  heatCtx.putImageData(imageData, 0, 0);
  heatCtx.restore();
}

// ── Draw waveform overlay ──────────────────────────────────────
function drawWaveform(rms) {
  // CSS pixel dimensions (transform is active)
  const W = heatCanvas.clientWidth;
  const H = 72;
  const n = rms.length;
  let maxRms = 0;
  for (let i = 0; i < n; i++) if (rms[i] > maxRms) maxRms = rms[i];
  if (maxRms === 0) maxRms = 1;

  waveCtxEl.clearRect(0, 0, W, H);
  waveCtxEl.strokeStyle = 'rgba(255,255,255,0.55)';
  waveCtxEl.lineWidth = 1;
  waveCtxEl.beginPath();
  for (let x = 0; x < W; x++) {
    const idx = Math.floor(x / W * n);
    const amp = rms[idx] / maxRms;
    const yTop    = H / 2 - amp * H / 2;
    const yBottom = H / 2 + amp * H / 2;
    waveCtxEl.moveTo(x + 0.5, yTop);
    waveCtxEl.lineTo(x + 0.5, yBottom);
  }
  waveCtxEl.stroke();
}

// ── Playback ───────────────────────────────────────────────────
function playAudio() {
  if (!audioBuffer) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!gainNode) {
    gainNode = audioCtx.createGain();
    gainNode.gain.value = parseFloat(document.getElementById('volSlider').value);
    gainNode.connect(audioCtx.destination);
  }
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.playbackRate.value = playbackRate;
  sourceNode.loop = loopEnabled;
  sourceNode.connect(gainNode);
  sourceNode.onended = () => {
    // loop=true: onended never fires (Web Audio loops internally), so this
    // only runs when playback genuinely ends (loop=false or manually stopped).
    if (isPlaying && !loopEnabled) {
      isPlaying = false;
      pauseOffset = 0;
      updatePlayBtn();
      updatePlayhead(0);
      cancelAnimationFrame(rafId);
    }
  };
  startTime = audioCtx.currentTime - pauseOffset;
  sourceNode.start(0, pauseOffset);
  isPlaying = true;
  updatePlayBtn();
  animatePlayhead();
}

function pauseAudio() {
  if (!isPlaying) return;
  // elapsed wall-clock × playbackRate = actual audio position
  pauseOffset = (audioCtx.currentTime - startTime) * playbackRate;
  sourceNode.stop();
  isPlaying = false;
  updatePlayBtn();
  cancelAnimationFrame(rafId);
}

function stopAudio() {
  if (sourceNode) { try { sourceNode.stop(); } catch(e){} sourceNode = null; }
  isPlaying = false;
  pauseOffset = 0;
  cancelAnimationFrame(rafId);
  updatePlayBtn();
  updatePlayhead(0);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (!audioBuffer) return;
  isPlaying ? pauseAudio() : playAudio();
});

document.getElementById('volSlider').addEventListener('input', e => {
  if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
});

function updatePlayBtn() {
  document.getElementById('iconPlay').style.display  = isPlaying ? 'none' : '';
  document.getElementById('iconPause').style.display = isPlaying ? '' : 'none';
}

// ── Animate playhead ───────────────────────────────────────────
function animatePlayhead() {
  if (!isPlaying) return;
  const elapsed = audioCtx.currentTime - startTime;
  const pct = Math.min(elapsed / duration, 1);
  updatePlayhead(pct);
  document.getElementById('timeCur').textContent = fmtTime(elapsed);
  rafId = requestAnimationFrame(animatePlayhead);
}

function updatePlayhead(pct) {
  const accent = PALETTES[activePalette].accent;
  const pctStr = (pct * 100) + '%';
  document.getElementById('playheadLine').style.left   = pctStr;
  document.getElementById('progressFill').style.width  = pctStr;
  document.getElementById('specPlayhead').style.left   = pctStr;
  document.getElementById('specProgress').style.width  = pctStr;
  document.getElementById('playheadLine').style.background  = accent;
  document.getElementById('playheadLine').style.boxShadow   = `0 0 10px ${accent}, 0 0 20px ${accent}66`;
  document.getElementById('specPlayhead').style.background  = accent;
  document.getElementById('specPlayhead').style.boxShadow   = `0 0 8px ${accent}, 0 0 16px ${accent}66`;
}

// ── Scrub on viz click/drag (both waveform & spectrogram zones) ─
const vizArea  = document.getElementById('vizArea');
const specArea = document.getElementById('specArea');
const scrubTip  = document.getElementById('scrubTip');
const scrubTip2 = document.getElementById('scrubTip2');
let isScrubbing = false;

function getScrubPctFrom(el, e) {
  const rect = el.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return Math.max(0, Math.min(1, x / rect.width));
}

function doScrub(pct) {
  pauseOffset = pct * duration;
  updatePlayhead(pct);
  document.getElementById('timeCur').textContent = fmtTime(pauseOffset);
  if (isPlaying) {
    sourceNode.stop();
    sourceNode = null;
    isPlaying = false;
    playAudio();
  }
}

function attachScrub(el, tipEl) {
  el.addEventListener('mousedown', e => { isScrubbing = true; doScrub(getScrubPctFrom(el, e)); });
  el.addEventListener('mousemove', e => {
    if (!audioBuffer) return;
    const pct = getScrubPctFrom(el, e);
    tipEl.style.left    = (pct * 100) + '%';
    tipEl.style.opacity = '1';
    tipEl.textContent   = fmtTime(pct * duration);
    if (isScrubbing) doScrub(pct);
  });
  el.addEventListener('mouseleave', () => { tipEl.style.opacity = '0'; });
  el.addEventListener('touchstart', e => { e.preventDefault(); isScrubbing = true; doScrub(getScrubPctFrom(el, e)); }, {passive:false});
  el.addEventListener('touchmove',  e => { if (isScrubbing) { e.preventDefault(); doScrub(getScrubPctFrom(el, e)); } }, {passive:false});
}
attachScrub(vizArea,  scrubTip);
attachScrub(specArea, scrubTip2);
window.addEventListener('mouseup',  () => { isScrubbing = false; });
window.addEventListener('touchend', () => { isScrubbing = false; });

// ── Processing UI ──────────────────────────────────────────────
function showProcessing(show, label='', pct=0) {
  const el = document.getElementById('processing');
  if (show) {
    el.classList.add('visible');
    document.getElementById('procLabel').textContent = label;
    document.getElementById('procBar').style.width   = pct + '%';
  } else {
    el.classList.remove('visible');
  }
}
function setProgress(pct) {
  document.getElementById('procBar').style.width = pct + '%';
}

// ── Resize ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!waveformData) return;
  sizeCanvases();
  drawHeatmap(waveformData);
  drawWaveform(waveformData);
  if (spectroData) drawSpectrogram(spectroData, spectroFrames, spectroFreqBins);
});

// ── Loop ───────────────────────────────────────────────────────
const btnLoop = document.getElementById('btnLoop');
function toggleLoop() {
  loopEnabled = !loopEnabled;
  btnLoop.classList.toggle('active', loopEnabled);
  if (sourceNode) sourceNode.loop = loopEnabled;
}
btnLoop.addEventListener('click', toggleLoop);

// ── Playback speed (log scale: slider -1..1.6 → speed 0.1..5) ─
const speedSlider = document.getElementById('speedSlider');
const speedValEl  = document.getElementById('speedVal');
function sliderToRate(v) {
  // v in [-1, 1.6] → rate = 2^v  → [0.5, ~3], then clamp to [0.1, 5]
  return Math.max(0.1, Math.min(5, Math.pow(2, parseFloat(v))));
}
function rateToSlider(r) { return Math.log2(r); }
speedSlider.addEventListener('input', e => {
  playbackRate = sliderToRate(e.target.value);
  speedValEl.textContent = playbackRate.toFixed(2).replace(/\.?0+$/, '') + '×';
  if (sourceNode) sourceNode.playbackRate.value = playbackRate;
});

// ── Frequency range (vertical zoom for spectrogram) ────────────
const freqLowEl    = document.getElementById('freqLow');
const freqHighEl   = document.getElementById('freqHigh');
const freqLowVal   = document.getElementById('freqLowVal');
const freqHighVal  = document.getElementById('freqHighVal');
const freqFill     = document.getElementById('freqTrackFill');

function pctToHz(pct) {
  // log scale: 0%=20Hz, 100%=Nyquist
  const minLog = Math.log10(20);
  const maxLog = Math.log10(nyquistHz);
  return Math.round(Math.pow(10, minLog + (pct / 100) * (maxLog - minLog)));
}
function hzLabel(hz) { return hz >= 1000 ? (hz/1000).toFixed(hz >= 10000 ? 0 : 1) + 'k Hz' : hz + ' Hz'; }

function updateFreqFill() {
  const lo = Math.min(freqLowPct, freqHighPct);
  const hi = Math.max(freqLowPct, freqHighPct);
  freqFill.style.left  = lo + '%';
  freqFill.style.width = (hi - lo) + '%';
  freqLowVal.textContent  = hzLabel(pctToHz(lo));
  freqHighVal.textContent = hzLabel(pctToHz(hi));
}
function onFreqRangeChange() {
  updateFreqFill();
  if (spectroData) {
    drawSpectrogram(spectroData, spectroFrames, spectroFreqBins);
    // Rebuild axis labels to reflect new visible range
    if (audioBuffer) buildSpecAxis(audioBuffer.sampleRate, spectroFreqBins, spectroFftSize);
  }
}
freqLowEl.addEventListener('input', e => {
  freqLowPct = parseFloat(e.target.value);
  if (freqLowPct > freqHighPct - 2) { freqLowPct = freqHighPct - 2; e.target.value = freqLowPct; }
  onFreqRangeChange();
});
freqHighEl.addEventListener('input', e => {
  freqHighPct = parseFloat(e.target.value);
  if (freqHighPct < freqLowPct + 2) { freqHighPct = freqLowPct + 2; e.target.value = freqHighPct; }
  onFreqRangeChange();
});
updateFreqFill();

// ── Space: play / pause ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!audioBuffer) return;
    isPlaying ? pauseAudio() : playAudio();
  }
  // [ ] → toggle loop
  if (e.key === '[' || e.key === ']') toggleLoop();
});

// ── Opt + scroll: horizontal zoom ─────────────────────────────
const MIN_ZOOM = 1;
const MAX_ZOOM = 20;

function applyZoom() {
  const vizStack = document.getElementById('vizStack');
  // Scale the inner content; the outer card clips overflow
  // We stretch the canvases and overlay elements via CSS transform on the stack's inner content
  const wPx = document.getElementById('vizArea').parentElement.clientWidth;

  // Instead of CSS transform (which breaks pixel-perfect canvas), we redraw at zoom
  // by adjusting which slice of frames/samples to render
  redrawZoomed();
}

function redrawZoomed() {
  if (!waveformData) return;
  const n = waveformData.length;
  const startFrac = zoomOffset;
  const endFrac   = Math.min(1, zoomOffset + 1 / zoomScale);

  // Slice waveform
  const startIdx = Math.floor(startFrac * n);
  const endIdx   = Math.ceil(endFrac * n);
  const slicedRms = waveformData.slice(startIdx, endIdx);

  drawHeatmap(slicedRms);
  drawWaveform(slicedRms);

  if (spectroData) {
    const startFrame = Math.floor(startFrac * spectroFrames);
    const endFrame   = Math.ceil(endFrac * spectroFrames);
    // Build sliced spectro view
    const slicedFrames = endFrame - startFrame;
    const slicedSpec   = new Float32Array(slicedFrames * spectroFreqBins);
    for (let f = 0; f < slicedFrames; f++) {
      const srcF = startFrame + f;
      for (let b = 0; b < spectroFreqBins; b++) {
        slicedSpec[f * spectroFreqBins + b] = spectroData[srcF * spectroFreqBins + b];
      }
    }
    drawSpectrogram(slicedSpec, slicedFrames, spectroFreqBins);
  }

  // Adjust playhead position within zoom window
  const elapsed = isPlaying
    ? audioCtx.currentTime - startTime
    : pauseOffset;
  const globalPct = Math.min(elapsed / duration, 1);
  const localPct  = Math.max(0, Math.min(1,
    (globalPct - zoomOffset) * zoomScale
  ));
  updatePlayhead(localPct);
}

// Override updatePlayhead to be zoom-aware
const _origUpdatePlayhead = updatePlayhead;
function updatePlayhead(pct) {
  // pct here is already local (zoom-adjusted) when called from redrawZoomed,
  // or global when called from animatePlayhead — convert global→local
  const accent = PALETTES[activePalette].accent;
  const pctStr = (pct * 100) + '%';
  document.getElementById('playheadLine').style.left   = pctStr;
  document.getElementById('progressFill').style.width  = pctStr;
  document.getElementById('specPlayhead').style.left   = pctStr;
  document.getElementById('specProgress').style.width  = pctStr;
  document.getElementById('playheadLine').style.background  = accent;
  document.getElementById('playheadLine').style.boxShadow   = `0 0 10px ${accent}, 0 0 20px ${accent}66`;
  document.getElementById('specPlayhead').style.background  = accent;
  document.getElementById('specPlayhead').style.boxShadow   = `0 0 8px ${accent}, 0 0 16px ${accent}66`;
}

// Patch animatePlayhead to use zoom-local pct and playbackRate-corrected time
function animatePlayhead() {
  if (!isPlaying) return;
  const wallElapsed = audioCtx.currentTime - startTime;
  let audioPos = wallElapsed * playbackRate;  // actual position in audio seconds

  if (loopEnabled && duration > 0) {
    // Wrap position within [0, duration] for loop display
    audioPos = audioPos % duration;
  }

  const globalPct = Math.min(audioPos / duration, 1);
  const localPct  = Math.max(0, Math.min(1, (globalPct - zoomOffset) * zoomScale));
  updatePlayhead(localPct);
  document.getElementById('timeCur').textContent = fmtTime(audioPos);
  rafId = requestAnimationFrame(animatePlayhead);
}

// Patch doScrub to convert local→global
function doScrub(pct) {
  // pct is local (within zoom window); convert to global
  const globalPct = zoomOffset + pct / zoomScale;
  pauseOffset = Math.max(0, Math.min(1, globalPct)) * duration;
  updatePlayhead(pct);
  document.getElementById('timeCur').textContent = fmtTime(pauseOffset);
  if (isPlaying) {
    sourceNode.stop();
    sourceNode = null;
    isPlaying = false;
    playAudio();
  }
}

// Wheel handler: opt/alt + scroll → zoom
const vizStack = document.getElementById('vizStack');
vizStack.addEventListener('wheel', e => {
  if (!e.altKey || !waveformData) return;
  e.preventDefault();

  const rect   = vizStack.getBoundingClientRect();
  const mouseX = (e.clientX - rect.left) / rect.width; // 0-1 within stack

  // Zoom in/out
  const delta = e.deltaY > 0 ? 0.85 : 1.15;
  const newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomScale * delta));

  // Keep the point under the mouse fixed
  // mouseX = (focusFrac - zoomOffset) * zoomScale
  // → focusFrac = zoomOffset + mouseX / zoomScale
  const focusFrac = zoomOffset + mouseX / zoomScale;
  zoomOffset = focusFrac - mouseX / newScale;
  zoomOffset = Math.max(0, Math.min(1 - 1 / newScale, zoomOffset));
  zoomScale  = newScale;

  redrawZoomed();
}, { passive: false });
</script>
