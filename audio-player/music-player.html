<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg-deep: #080c10;
    --bg-card: #0f1520;
    --bg-panel: #141c28;
    --border: #1e2d42;
    --border-glow: #1a3a5c;
    --cyan: #00e5ff;
    --cyan-dim: #00b8cc;
    --purple: #b06aff;
    --lime: #a3ff47;
    --amber: #ffb830;
    --coral: #ff5e7a;
    --text-primary: #e8f4ff;
    --text-secondary: #7a9ab8;
    --text-muted: #3d5470;
    --knob-track: #1a2a3a;
    --knob-fill: #00e5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, #001a3a44 0%, transparent 70%),
      radial-gradient(ellipse 400px 600px at 80% 30%, #1a003a33 0%, transparent 70%);
    pointer-events: none;
  }

  .player {
    width: 580px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow:
      0 0 0 1px #0a1a2a,
      0 24px 80px #000a,
      0 0 60px #00e5ff0a;
    overflow: hidden;
    position: relative;
  }

  /* Top section: track info + waveform */
  .player-top {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1620 0%, var(--bg-card) 100%);
  }

  .track-info {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .album-art {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: linear-gradient(135deg, #1a2a4a, #0a1a2a);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .album-art::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--bg-deep);
    border: 2px solid var(--border);
  }

  .album-art-ring {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px solid #1e3a5a;
    animation: spin 8s linear infinite;
    animation-play-state: paused;
  }

  .album-art-ring.playing { animation-play-state: running; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .track-meta { flex: 1; min-width: 0; }

  .track-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }

  .track-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--cyan-dim);
    background: transparent;
    color: var(--cyan);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .play-btn:hover {
    background: #00e5ff18;
    box-shadow: 0 0 16px #00e5ff44;
    transform: scale(1.05);
  }

  .play-btn svg { width: 14px; height: 14px; }

  /* Time display */
  .time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
    letter-spacing: 0.08em;
  }

  /* Waveform / progress bar */
  .waveform-wrap {
    position: relative;
    height: 28px;
    cursor: pointer;
  }

  .waveform-canvas {
    width: 100%;
    height: 100%;
    border-radius: 4px;
  }

  /* Bottom section: controls */
  .player-bottom {
    padding: 20px 24px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* Left: knob + sensitivity slider */
  .knob-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .knob-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .knob-container {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .knob-svg {
    width: 100%;
    height: 100%;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  .knob-svg:active { cursor: grabbing; }

  .knob-value-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .knob-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }

  .knob-unit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-secondary);
    margin-top: 2px;
    letter-spacing: 0.1em;
  }

  /* Sensitivity slider */
  .sensitivity-wrap {
    width: 120px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sensitivity-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  .sensitivity-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--knob-track);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
  }

  .sensitivity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    background: var(--bg-panel);
    border: 1px solid var(--cyan-dim);
    cursor: grab;
    box-shadow: 0 0 8px #00e5ff44;
    transition: box-shadow 0.15s;
  }

  .sensitivity-slider::-webkit-slider-thumb:hover {
    box-shadow: 0 0 14px #00e5ff88;
  }

  .sensitivity-slider::-webkit-slider-thumb:active {
    cursor: grabbing;
  }

  .sensitivity-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    background: var(--bg-panel);
    border: 1px solid var(--cyan-dim);
    cursor: grab;
  }

  /* Right: parameter selector buttons */
  .params-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .params-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .param-btn {
    padding: 12px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-secondary);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }

  .param-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .param-btn:hover {
    border-color: var(--border-glow);
    color: var(--text-primary);
    transform: translateY(-1px);
  }

  .param-btn.active {
    color: var(--text-primary);
    border-color: transparent;
  }

  .param-btn .param-icon {
    font-size: 16px;
    line-height: 1;
  }

  .param-btn .param-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.7;
    letter-spacing: 0.05em;
  }

  /* Per-param accent colors */
  .param-btn[data-param="progress"].active {
    background: linear-gradient(135deg, #001a3a, #002a50);
    border-color: var(--cyan);
    box-shadow: 0 0 20px #00e5ff22, inset 0 1px 0 #00e5ff33;
  }
  .param-btn[data-param="progress"].active .param-icon { color: var(--cyan); }

  .param-btn[data-param="speed"].active {
    background: linear-gradient(135deg, #1a0a3a, #280a50);
    border-color: var(--purple);
    box-shadow: 0 0 20px #b06aff22, inset 0 1px 0 #b06aff33;
  }
  .param-btn[data-param="speed"].active .param-icon { color: var(--purple); }

  .param-btn[data-param="volume"].active {
    background: linear-gradient(135deg, #1a2a00, #253a00);
    border-color: var(--lime);
    box-shadow: 0 0 20px #a3ff4722, inset 0 1px 0 #a3ff4733;
  }
  .param-btn[data-param="volume"].active .param-icon { color: var(--lime); }

  .param-btn[data-param="pitch"].active {
    background: linear-gradient(135deg, #2a1a00, #3a2500);
    border-color: var(--amber);
    box-shadow: 0 0 20px #ffb83022, inset 0 1px 0 #ffb83033;
  }
  .param-btn[data-param="pitch"].active .param-icon { color: var(--amber); }

  /* Knob arc colors per param */
  .knob-arc-progress { stroke: var(--cyan); filter: drop-shadow(0 0 4px var(--cyan)); }
  .knob-arc-speed    { stroke: var(--purple); filter: drop-shadow(0 0 4px var(--purple)); }
  .knob-arc-volume   { stroke: var(--lime); filter: drop-shadow(0 0 4px var(--lime)); }
  .knob-arc-pitch    { stroke: var(--amber); filter: drop-shadow(0 0 4px var(--amber)); }

  /* Tick marks on sensitivity track */
  .sensitivity-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }

  .sensitivity-ticks span {
    width: 1px;
    height: 4px;
    background: var(--border);
    border-radius: 1px;
  }

  /* Status bar */
  .status-bar {
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    background: #0a1018;
  }

  .status-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .status-dot.active {
    background: var(--lime);
    box-shadow: 0 0 6px var(--lime);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Tooltip on knob */
  .knob-tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    border: 1px solid var(--border-glow);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .knob-container:hover .knob-tooltip { opacity: 1; }
</style>
</head>
<body>

<div class="player">
  <!-- Top: track info + waveform -->
  <div class="player-top">
    <div class="track-info">
      <div class="album-art">
        <div class="album-art-ring" id="albumRing"></div>
      </div>
      <div class="track-meta">
        <div class="track-title" id="trackTitle">music.mp3</div>
        <div class="track-sub" id="trackSub">LOCAL · AUDIO</div>
      </div>
      <button class="play-btn" id="playBtn" title="播放/暂停">
        <svg id="playIcon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 2.5l10 5.5-10 5.5V2.5z"/>
        </svg>
      </button>
    </div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
    <div class="waveform-wrap">
      <canvas class="waveform-canvas" id="waveCanvas"></canvas>
    </div>
  </div>

  <!-- Bottom: knob + params -->
  <div class="player-bottom">
    <!-- Knob section -->
    <div class="knob-section">
      <div class="knob-label">CONTROL</div>
      <div class="knob-container" id="knobContainer">
        <div class="knob-tooltip" id="knobTooltip">拖动旋钮调节</div>
        <svg class="knob-svg" id="knobSvg" viewBox="0 0 100 100">
          <!-- Outer ring -->
          <circle cx="50" cy="50" r="44" fill="none" stroke="#0d1a28" stroke-width="2"/>
          <!-- Track arc -->
          <path id="knobTrack" fill="none" stroke="#1a2a3a" stroke-width="6" stroke-linecap="round"
                d="M 17.6 73.5 A 38 38 0 1 1 82.4 73.5"/>
          <!-- Value arc -->
          <path id="knobArc" fill="none" stroke-width="6" stroke-linecap="round"
                class="knob-arc-progress"
                d="M 17.6 73.5 A 38 38 0 0 1 50 12"/>
          <!-- Knob body -->
          <circle cx="50" cy="50" r="28" fill="#0d1a28" stroke="#1e2d42" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="22" fill="url(#knobGrad)"/>
          <!-- Indicator line -->
          <line id="knobIndicator" x1="50" y1="50" x2="50" y2="30"
                stroke="#e8f4ff" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <radialGradient id="knobGrad" cx="40%" cy="35%">
              <stop offset="0%" stop-color="#1e3050"/>
              <stop offset="100%" stop-color="#0a1520"/>
            </radialGradient>
          </defs>
        </svg>
        <div class="knob-value-display">
          <div class="knob-value" id="knobValue">50</div>
          <div class="knob-unit" id="knobUnit">%</div>
        </div>
      </div>

      <!-- Sensitivity slider -->
      <div class="sensitivity-wrap">
        <div class="sensitivity-label">
          <span>灵敏度</span>
          <span id="sensitivityVal">5</span>
        </div>
        <input type="range" class="sensitivity-slider" id="sensitivitySlider"
               min="1" max="10" value="5" step="1">
        <div class="sensitivity-ticks">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Parameter buttons -->
    <div class="params-section">
      <div class="params-grid">
        <button class="param-btn active" data-param="progress">
          <span class="param-icon">⏱</span>
          <span>进度</span>
          <span class="param-val" id="val-progress">0%</span>
        </button>
        <button class="param-btn" data-param="speed">
          <span class="param-icon">⚡</span>
          <span>速度</span>
          <span class="param-val" id="val-speed">1.0×</span>
        </button>
        <button class="param-btn" data-param="volume">
          <span class="param-icon">◎</span>
          <span>响度</span>
          <span class="param-val" id="val-volume">80%</span>
        </button>
        <button class="param-btn" data-param="pitch">
          <span class="param-icon">♪</span>
          <span>音调</span>
          <span class="param-val" id="val-pitch">0st</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">STOPPED</span>
    </div>
    <div class="status-item">SENSITIVITY <span id="statusSens">×5</span></div>
    <div class="status-item" id="statusActive">PARAM: PROGRESS</div>
  </div>
</div>

<!-- Hidden audio element -->
<audio id="audioEl" src="music.mp3" preload="auto"></audio>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  activeParam: 'progress',
  sensitivity: 5,
  playing: false,
  values: {
    progress: 0,   // 0–100 (%)
    speed: 50,     // 0–100 → maps to 0.25×–4×
    volume: 80,    // 0–100 (%)
    pitch: 50,     // 0–100 → maps to -12st to +12st
  },
  knobAngle: 0,    // -135 to +135 degrees
  dragging: false,
  lastY: 0,
  lastX: 0,
};

// Parameter metadata
const paramMeta = {
  progress: { unit: '%',  min: 0,    max: 100,  decimals: 0, label: 'PROGRESS' },
  speed:    { unit: '×',  min: 0,    max: 100,  decimals: 0, label: 'SPEED'    },
  volume:   { unit: '%',  min: 0,    max: 100,  decimals: 0, label: 'VOLUME'   },
  pitch:    { unit: 'st', min: 0,    max: 100,  decimals: 0, label: 'PITCH'    },
};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const audio        = document.getElementById('audioEl');
const playBtn      = document.getElementById('playBtn');
const playIcon     = document.getElementById('playIcon');
const albumRing    = document.getElementById('albumRing');
const currentTimeEl= document.getElementById('currentTime');
const totalTimeEl  = document.getElementById('totalTime');
const waveCanvas   = document.getElementById('waveCanvas');
const knobSvg      = document.getElementById('knobSvg');
const knobArc      = document.getElementById('knobArc');
const knobIndicator= document.getElementById('knobIndicator');
const knobValue    = document.getElementById('knobValue');
const knobUnit     = document.getElementById('knobUnit');
const sensSlider   = document.getElementById('sensitivitySlider');
const sensitivityVal= document.getElementById('sensitivityVal');
const statusDot    = document.getElementById('statusDot');
const statusText   = document.getElementById('statusText');
const statusSens   = document.getElementById('statusSens');
const statusActive = document.getElementById('statusActive');
const trackTitle   = document.getElementById('trackTitle');
const paramBtns    = document.querySelectorAll('.param-btn');

// ─── Waveform canvas ──────────────────────────────────────────────────────────
const ctx = waveCanvas.getContext('2d');
let waveData = [];

function initWaveform() {
  const W = waveCanvas.parentElement.offsetWidth;
  waveCanvas.width  = W * devicePixelRatio;
  waveCanvas.height = 28 * devicePixelRatio;
  waveCanvas.style.width  = W + 'px';
  waveCanvas.style.height = '28px';
  ctx.scale(devicePixelRatio, devicePixelRatio);

  // Generate pseudo-waveform bars
  const bars = Math.floor(W / 3);
  waveData = Array.from({length: bars}, () => 0.15 + Math.random() * 0.85);
  drawWaveform(state.values.progress / 100);
}

function drawWaveform(progress) {
  const W = waveCanvas.width / devicePixelRatio;
  const H = 28;
  ctx.clearRect(0, 0, W, H);

  const bars = waveData.length;
  const barW = 2;
  const gap  = 1;
  const step = barW + gap;
  const cx   = Math.floor(progress * bars);

  for (let i = 0; i < bars; i++) {
    const h   = waveData[i] * H * 0.85;
    const x   = i * step;
    const y   = (H - h) / 2;
    const frac = i / bars;

    if (i < cx) {
      // Played — cyan gradient
      const alpha = 0.6 + frac * 0.4;
      ctx.fillStyle = `rgba(0,229,255,${alpha})`;
    } else {
      // Unplayed
      ctx.fillStyle = '#1a2a3a';
    }
    ctx.beginPath();
    ctx.roundRect(x, y, barW, h, 1);
    ctx.fill();
  }

  // Playhead line
  if (progress > 0 && progress < 1) {
    const px = cx * step;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, H);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ─── Knob rendering ───────────────────────────────────────────────────────────
// Knob range: -135° to +135° (270° total sweep)
const KNOB_MIN_DEG = -135;
const KNOB_MAX_DEG =  135;
const CX = 50, CY = 50, R = 38;

function degToRad(d) { return d * Math.PI / 180; }

function arcPoint(deg) {
  const rad = degToRad(deg - 90); // -90 so 0° is top
  return {
    x: CX + R * Math.cos(rad),
    y: CY + R * Math.sin(rad),
  };
}

function buildArcPath(startDeg, endDeg) {
  const start = arcPoint(startDeg);
  const end   = arcPoint(endDeg);
  const sweep = ((endDeg - startDeg) + 360) % 360;
  const large = sweep > 180 ? 1 : 0;
  return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
}

function updateKnobVisual(val) {
  // val 0–100 → angle KNOB_MIN_DEG to KNOB_MAX_DEG
  const t   = val / 100;
  const deg = KNOB_MIN_DEG + t * (KNOB_MAX_DEG - KNOB_MIN_DEG);

  // Arc
  knobArc.setAttribute('d', buildArcPath(KNOB_MIN_DEG, deg));

  // Indicator line
  const rad = degToRad(deg - 90);
  const lx  = CX + 22 * Math.cos(rad);
  const ly  = CY + 22 * Math.sin(rad);
  knobIndicator.setAttribute('x2', lx.toFixed(2));
  knobIndicator.setAttribute('y2', ly.toFixed(2));

  // Arc color class
  knobArc.className.baseVal = `knob-arc-${state.activeParam}`;

  // Text
  const meta = paramMeta[state.activeParam];
  let displayVal;
  if (state.activeParam === 'speed') {
    displayVal = (0.25 + val / 100 * 3.75).toFixed(2);
    knobUnit.textContent = '×';
  } else if (state.activeParam === 'pitch') {
    displayVal = (Math.round((val / 100 * 24) - 12)).toString();
    knobUnit.textContent = 'st';
  } else {
    displayVal = Math.round(val).toString();
    knobUnit.textContent = meta.unit;
  }
  knobValue.textContent = displayVal;
}

// ─── Apply param value to audio ───────────────────────────────────────────────
function applyToAudio(param, val) {
  switch(param) {
    case 'progress':
      if (audio.duration && isFinite(audio.duration)) {
        audio.currentTime = (val / 100) * audio.duration;
      }
      drawWaveform(val / 100);
      document.getElementById('val-progress').textContent = Math.round(val) + '%';
      break;
    case 'speed':
      const rate = 0.25 + (val / 100) * 3.75;
      audio.playbackRate = rate;
      document.getElementById('val-speed').textContent = rate.toFixed(2) + '×';
      break;
    case 'volume':
      audio.volume = val / 100;
      document.getElementById('val-volume').textContent = Math.round(val) + '%';
      break;
    case 'pitch':
      // Pitch shift is not natively supported; display only
      const semitones = Math.round((val / 100 * 24) - 12);
      document.getElementById('val-pitch').textContent = (semitones >= 0 ? '+' : '') + semitones + 'st';
      break;
  }
}

// ─── Knob interaction ─────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function onKnobDelta(delta) {
  // delta in pixels, sensitivity 1–10
  const sens = state.sensitivity;
  // pixels per full sweep (270°): lower sens = more pixels needed
  const pixelsPerSweep = 600 - sens * 50; // 550px at sens=1, 100px at sens=10
  const change = (delta / pixelsPerSweep) * 100;
  const newVal = clamp(state.values[state.activeParam] - change, 0, 100);
  state.values[state.activeParam] = newVal;
  updateKnobVisual(newVal);
  applyToAudio(state.activeParam, newVal);
}

// Mouse
knobSvg.addEventListener('mousedown', e => {
  state.dragging = true;
  state.lastY = e.clientY;
  state.lastX = e.clientX;
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!state.dragging) return;
  const dy = e.clientY - state.lastY;
  const dx = e.clientX - state.lastX;
  // Use vertical movement primarily, horizontal as modifier
  onKnobDelta(dy - dx * 0.3);
  state.lastY = e.clientY;
  state.lastX = e.clientX;
});

window.addEventListener('mouseup', () => { state.dragging = false; });

// Touch
knobSvg.addEventListener('touchstart', e => {
  state.dragging = true;
  state.lastY = e.touches[0].clientY;
  state.lastX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!state.dragging) return;
  const dy = e.touches[0].clientY - state.lastY;
  const dx = e.touches[0].clientX - state.lastX;
  onKnobDelta(dy - dx * 0.3);
  state.lastY = e.touches[0].clientY;
  state.lastX = e.touches[0].clientX;
}, { passive: false });

window.addEventListener('touchend', () => { state.dragging = false; });

// Scroll wheel on knob
knobSvg.addEventListener('wheel', e => {
  e.preventDefault();
  onKnobDelta(e.deltaY * 0.5);
}, { passive: false });

// ─── Parameter buttons ────────────────────────────────────────────────────────
paramBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    paramBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.activeParam = btn.dataset.param;
    updateKnobVisual(state.values[state.activeParam]);
    statusActive.textContent = 'PARAM: ' + paramMeta[state.activeParam].label;
  });
});

// ─── Sensitivity slider ───────────────────────────────────────────────────────
sensSlider.addEventListener('input', () => {
  state.sensitivity = parseInt(sensSlider.value);
  sensitivityVal.textContent = state.sensitivity;
  statusSens.textContent = '×' + state.sensitivity;
});

// ─── Waveform click to seek ───────────────────────────────────────────────────
waveCanvas.addEventListener('click', e => {
  const rect = waveCanvas.getBoundingClientRect();
  const frac = (e.clientX - rect.left) / rect.width;
  state.values.progress = frac * 100;
  if (audio.duration) audio.currentTime = frac * audio.duration;
  updateKnobVisual(state.values[state.activeParam]);
  drawWaveform(frac);
  document.getElementById('val-progress').textContent = Math.round(frac * 100) + '%';
});

// ─── Play / Pause ─────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (state.playing) {
    audio.pause();
  } else {
    audio.play().catch(() => {});
  }
});

audio.addEventListener('play', () => {
  state.playing = true;
  playIcon.innerHTML = '<rect x="3" y="2" width="4" height="12" rx="1"/><rect x="9" y="2" width="4" height="12" rx="1"/>';
  albumRing.classList.add('playing');
  statusDot.classList.add('active');
  statusText.textContent = 'PLAYING';
});

audio.addEventListener('pause', () => {
  state.playing = false;
  playIcon.innerHTML = '<path d="M4 2.5l10 5.5-10 5.5V2.5z"/>';
  albumRing.classList.remove('playing');
  statusDot.classList.remove('active');
  statusText.textContent = 'PAUSED';
});

audio.addEventListener('ended', () => {
  state.playing = false;
  playIcon.innerHTML = '<path d="M4 2.5l10 5.5-10 5.5V2.5z"/>';
  albumRing.classList.remove('playing');
  statusDot.classList.remove('active');
  statusText.textContent = 'STOPPED';
});

// ─── Time update ──────────────────────────────────────────────────────────────
function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

audio.addEventListener('timeupdate', () => {
  const prog = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  currentTimeEl.textContent = formatTime(audio.currentTime);
  state.values.progress = prog;
  if (state.activeParam === 'progress') updateKnobVisual(prog);
  document.getElementById('val-progress').textContent = Math.round(prog) + '%';
  drawWaveform(prog / 100);
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
  const name = audio.src.split('/').pop().replace(/%20/g,' ');
  trackTitle.textContent = name;
});

audio.addEventListener('error', () => {
  trackTitle.textContent = 'music.mp3 (not found)';
});

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initWaveform();
  updateKnobVisual(state.values.progress);
  // Apply initial volume
  audio.volume = state.values.volume / 100;
  audio.playbackRate = 0.25 + (state.values.speed / 100) * 3.75;
});

window.addEventListener('resize', initWaveform);
</script>
</body>
</html>
